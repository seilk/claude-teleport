<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280" shape-rendering="crispEdges">
  <defs>
    <!-- Gradients -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1e1a2e"/>
      <stop offset="100%" stop-color="#0d0b12"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#d97757" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.25"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#d97757"/>
    </pattern>

    <!-- Animations -->
    <style>
      @keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.7}}
      @keyframes pulse{0%,100%{opacity:.25}50%{opacity:.55}}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
      @keyframes spinR{from{transform:rotate(360deg)}to{transform:rotate(0deg)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .s{animation:twinkle 3s ease-in-out infinite}
      .gl{animation:pulse 3s ease-in-out infinite}
      .cw{animation:spin 20s linear infinite;transform-box:fill-box;transform-origin:center}
      .ccw{animation:spinR 25s linear infinite;transform-box:fill-box;transform-origin:center}
      .fl{animation:float 4s ease-in-out infinite}
      .bk{animation:blink 1s step-end infinite}
    </style>

    <!-- Pixel font letters (8px grid, 5x7 = 40x56px) -->
    <g id="T"><rect width="40" height="8"/><rect x="16" y="8" width="8" height="48"/></g>
    <g id="E"><rect width="40" height="8"/><rect width="8" height="56"/><rect y="24" width="32" height="8"/><rect y="48" width="40" height="8"/></g>
    <g id="L"><rect width="8" height="56"/><rect y="48" width="40" height="8"/></g>
    <g id="P"><rect width="32" height="8"/><rect width="8" height="56"/><rect x="32" y="8" width="8" height="16"/><rect y="24" width="32" height="8"/></g>
    <g id="O"><rect x="8" width="24" height="8"/><rect y="8" width="8" height="40"/><rect x="32" y="8" width="8" height="40"/><rect x="8" y="48" width="24" height="8"/></g>
    <g id="R"><rect width="32" height="8"/><rect width="8" height="56"/><rect x="32" y="8" width="8" height="16"/><rect y="24" width="32" height="8"/><rect x="16" y="32" width="8" height="8"/><rect x="24" y="40" width="8" height="8"/><rect x="32" y="48" width="8" height="8"/></g>

    <!-- Desktop monitor icon (origin = center) -->
    <g id="mon">
      <rect x="-24" y="-20" width="48" height="4" fill="#f0a882"/>
      <rect x="-24" y="12" width="48" height="4" fill="#f0a882"/>
      <rect x="-24" y="-20" width="4" height="36" fill="#f0a882"/>
      <rect x="20" y="-20" width="4" height="36" fill="#f0a882"/>
      <rect x="-18" y="-12" width="20" height="4" fill="#d97757" opacity="0.6"/>
      <rect x="-18" y="-6" width="14" height="4" fill="#d97757" opacity="0.4"/>
      <rect x="-18" y="0" width="24" height="4" fill="#d97757" opacity="0.3"/>
      <rect x="-18" y="6" width="10" height="4" fill="#d97757" opacity="0.2"/>
      <rect x="14" y="-12" width="4" height="4" fill="#5bc0be" class="bk"/>
      <rect x="-4" y="16" width="8" height="8" fill="#f0a882"/>
      <rect x="-14" y="24" width="28" height="4" fill="#f0a882"/>
    </g>

    <!-- Laptop icon (origin = center) -->
    <g id="lap">
      <rect x="-24" y="-18" width="48" height="4" fill="#f0a882"/>
      <rect x="-24" y="10" width="48" height="4" fill="#f0a882"/>
      <rect x="-24" y="-18" width="4" height="32" fill="#f0a882"/>
      <rect x="20" y="-18" width="4" height="32" fill="#f0a882"/>
      <rect x="-18" y="-10" width="24" height="4" fill="#d97757" opacity="0.6"/>
      <rect x="-18" y="-4" width="16" height="4" fill="#d97757" opacity="0.4"/>
      <rect x="-18" y="2" width="20" height="4" fill="#d97757" opacity="0.3"/>
      <rect x="12" y="-10" width="4" height="4" fill="#5bc0be" class="bk" style="animation-delay:-0.5s"/>
      <rect x="-28" y="14" width="56" height="4" fill="#f0a882"/>
      <rect x="-28" y="18" width="56" height="4" fill="#b85a3a"/>
    </g>

    <!-- Outer portal ring dots (r~50, 12 dots, 6x6) -->
    <g id="oR">
      <rect x="47" y="-3" width="6" height="6"/>
      <rect x="40" y="22" width="6" height="6"/>
      <rect x="22" y="40" width="6" height="6"/>
      <rect x="-3" y="47" width="6" height="6"/>
      <rect x="-28" y="40" width="6" height="6"/>
      <rect x="-46" y="22" width="6" height="6"/>
      <rect x="-53" y="-3" width="6" height="6"/>
      <rect x="-46" y="-28" width="6" height="6"/>
      <rect x="-28" y="-46" width="6" height="6"/>
      <rect x="-3" y="-53" width="6" height="6"/>
      <rect x="22" y="-46" width="6" height="6"/>
      <rect x="40" y="-28" width="6" height="6"/>
    </g>

    <!-- Inner portal ring dots (r~36, 8 dots, 4x4) -->
    <g id="iR">
      <rect x="34" y="-2" width="4" height="4"/>
      <rect x="24" y="24" width="4" height="4"/>
      <rect x="-2" y="34" width="4" height="4"/>
      <rect x="-28" y="24" width="4" height="4"/>
      <rect x="-38" y="-2" width="4" height="4"/>
      <rect x="-28" y="-28" width="4" height="4"/>
      <rect x="-2" y="-38" width="4" height="4"/>
      <rect x="24" y="-28" width="4" height="4"/>
    </g>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <rect width="900" height="280" fill="url(#bg)" shape-rendering="auto"/>
  <rect width="900" height="280" fill="url(#scan)" opacity="0.02"/>
  <!-- Subtle color zones -->
  <circle cx="165" cy="175" r="110" fill="#d97757" opacity="0.025" shape-rendering="auto"/>
  <circle cx="735" cy="175" r="110" fill="#d97757" opacity="0.025" shape-rendering="auto"/>
  <circle cx="450" cy="120" r="90" fill="#5bc0be" opacity="0.012" shape-rendering="auto"/>
  <!-- Vignette -->
  <rect width="900" height="280" fill="url(#vig)" shape-rendering="auto"/>

  <!-- ===== TWINKLING STARS ===== -->
  <g fill="#f0a882">
    <rect x="52" y="28" width="4" height="4" class="s"/>
    <rect x="135" y="55" width="4" height="4" class="s" style="animation-delay:-0.8s"/>
    <rect x="218" y="16" width="4" height="4" class="s" style="animation-delay:-1.6s"/>
    <rect x="415" y="10" width="4" height="4" class="s" style="animation-delay:-0.4s"/>
    <rect x="535" y="35" width="4" height="4" class="s" style="animation-delay:-2.2s"/>
    <rect x="625" y="20" width="4" height="4" class="s" style="animation-delay:-1s"/>
    <rect x="785" y="14" width="4" height="4" class="s" style="animation-delay:-1.8s"/>
    <rect x="855" y="40" width="4" height="4" class="s" style="animation-delay:-0.6s"/>
    <rect x="42" y="245" width="4" height="4" class="s" style="animation-delay:-2.5s"/>
    <rect x="265" y="255" width="4" height="4" class="s" style="animation-delay:-1.3s"/>
    <rect x="490" y="252" width="4" height="4" class="s" style="animation-delay:-0.2s"/>
    <rect x="675" y="248" width="4" height="4" class="s" style="animation-delay:-1.9s"/>
    <rect x="840" y="260" width="4" height="4" class="s" style="animation-delay:-0.7s"/>
    <rect x="90" y="95" width="2" height="2" class="s" style="animation-delay:-1.4s"/>
    <rect x="310" y="12" width="2" height="2" class="s" style="animation-delay:-2s"/>
    <rect x="470" y="30" width="2" height="2" class="s" style="animation-delay:-0.3s"/>
    <rect x="710" y="45" width="2" height="2" class="s" style="animation-delay:-1.1s"/>
    <rect x="815" y="95" width="2" height="2" class="s" style="animation-delay:-2.3s"/>
    <rect x="150" y="240" width="2" height="2" class="s" style="animation-delay:-0.9s"/>
    <rect x="385" y="260" width="2" height="2" class="s" style="animation-delay:-1.7s"/>
    <rect x="590" y="245" width="2" height="2" class="s" style="animation-delay:-2.6s"/>
    <rect x="760" y="258" width="2" height="2" class="s" style="animation-delay:-0.5s"/>
  </g>

  <!-- ===== TEXT GLOW ===== -->
  <ellipse cx="450" cy="42" rx="210" ry="42" fill="url(#tg)" class="gl" shape-rendering="auto"/>

  <!-- ===== TITLE "TELEPORT" ===== -->
  <g fill="#f0a882">
    <use href="#T" x="262" y="14"/>
    <use href="#E" x="310" y="14"/>
    <use href="#L" x="358" y="14"/>
    <use href="#E" x="406" y="14"/>
    <use href="#P" x="454" y="14"/>
    <use href="#O" x="502" y="14"/>
    <use href="#R" x="550" y="14"/>
    <use href="#T" x="598" y="14"/>
  </g>

  <!-- ===== TAGLINE ===== -->
  <text x="450" y="86" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" font-weight="400" letter-spacing="2.5" fill="#d97757" opacity="0.55" shape-rendering="auto">BEAM YOUR CLAUDE CODE SETUP ACROSS MACHINES</text>

  <!-- ===== LEFT PORTAL (Desktop) ===== -->
  <g transform="translate(165,175)">
    <circle r="68" fill="url(#glow)" class="gl" shape-rendering="auto"/>
    <g class="cw"><use href="#oR" fill="#d97757" opacity="0.55"/></g>
    <g class="ccw"><use href="#iR" fill="#f0a882" opacity="0.45"/></g>
    <use href="#mon"/>
  </g>

  <!-- ===== RIGHT PORTAL (Laptop) ===== -->
  <g transform="translate(735,175)">
    <circle r="68" fill="url(#glow)" class="gl" style="animation-delay:-1.5s" shape-rendering="auto"/>
    <g class="ccw"><use href="#oR" fill="#d97757" opacity="0.55"/></g>
    <g class="cw"><use href="#iR" fill="#f0a882" opacity="0.45"/></g>
    <use href="#lap"/>
  </g>

  <!-- ===== ENERGY STREAMS ===== -->
  <!-- Track lines -->
  <line x1="220" y1="168" x2="680" y2="168" stroke="#d97757" stroke-width="2" stroke-dasharray="4 8" opacity="0.1"/>
  <line x1="220" y1="182" x2="680" y2="182" stroke="#5bc0be" stroke-width="2" stroke-dasharray="4 8" opacity="0.08"/>

  <!-- Right-traveling packets (orange) -->
  <rect x="215" y="164" width="8" height="8" fill="#f0a882" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="460 0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.8;.8;0" keyTimes="0;.03;.95;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="215" y="165" width="6" height="6" fill="#d97757" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="460 0" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.6;.6;0" keyTimes="0;.03;.95;1" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <rect x="215" y="165" width="6" height="6" fill="#f0a882" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="460 0" dur="3.5s" begin=".5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.5;.5;0" keyTimes="0;.03;.95;1" dur="3.5s" begin=".5s" repeatCount="indefinite"/>
  </rect>
  <rect x="215" y="166" width="4" height="4" fill="#e8956a" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="460 0" dur="2.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.7;.7;0" keyTimes="0;.03;.95;1" dur="2.5s" begin="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Left-traveling packets (teal) -->
  <rect x="667" y="178" width="8" height="8" fill="#5bc0be" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-460 0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.7;.7;0" keyTimes="0;.03;.95;1" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="667" y="179" width="6" height="6" fill="#3a9e9b" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-460 0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.5;.5;0" keyTimes="0;.03;.95;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="667" y="180" width="4" height="4" fill="#5bc0be" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-460 0" dur="4s" begin=".8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.6;.6;0" keyTimes="0;.03;.95;1" dur="4s" begin=".8s" repeatCount="indefinite"/>
  </rect>

  <!-- Center diamond -->
  <g fill="#f0a882" class="fl">
    <rect x="448" y="168" width="4" height="4"/>
    <rect x="444" y="172" width="4" height="4"/>
    <rect x="452" y="172" width="4" height="4"/>
    <rect x="448" y="176" width="4" height="4"/>
  </g>

  <!-- Signal bars -->
  <g fill="#5bc0be" opacity="0.35">
    <rect x="444" y="200" width="4" height="6"/>
    <rect x="448" y="196" width="4" height="10"/>
    <rect x="452" y="192" width="4" height="14"/>
  </g>

  <!-- ===== FLOATING PARTICLES ===== -->
  <g fill="#d97757">
    <rect x="280" y="155" width="4" height="4" class="fl" style="animation-delay:-.5s" opacity="0.4"/>
    <rect x="350" y="185" width="4" height="4" class="fl" style="animation-delay:-1.5s" opacity="0.3"/>
    <rect x="430" y="150" width="4" height="4" class="fl" style="animation-delay:-2.5s" opacity="0.35"/>
    <rect x="510" y="192" width="4" height="4" class="fl" style="animation-delay:-.8s" opacity="0.4"/>
    <rect x="575" y="158" width="4" height="4" class="fl" style="animation-delay:-1.8s" opacity="0.3"/>
    <rect x="640" y="188" width="4" height="4" class="fl" style="animation-delay:-2.2s" opacity="0.35"/>
  </g>

  <!-- ===== CORNER BRACKETS ===== -->
  <g fill="#d97757" opacity="0.15">
    <rect x="12" y="12" width="20" height="4"/><rect x="12" y="12" width="4" height="20"/>
    <rect x="868" y="12" width="20" height="4"/><rect x="884" y="12" width="4" height="20"/>
    <rect x="12" y="264" width="20" height="4"/><rect x="12" y="248" width="4" height="20"/>
    <rect x="868" y="264" width="20" height="4"/><rect x="884" y="248" width="4" height="20"/>
  </g>
</svg>
