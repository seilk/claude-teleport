<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Portal gradient -->
    <radialGradient id="portalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#d97757" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0"/>
    </radialGradient>

    <!-- Left portal ring gradient -->
    <linearGradient id="ringL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a882"/>
      <stop offset="50%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#b85a3a"/>
    </linearGradient>

    <!-- Right portal ring gradient -->
    <linearGradient id="ringR" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b85a3a"/>
      <stop offset="50%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#f0a882"/>
    </linearGradient>

    <!-- Energy stream gradient -->
    <linearGradient id="stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97757" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#f0a882" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d97757" stop-opacity="0.8"/>
    </linearGradient>

    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1f3d"/>
      <stop offset="100%" stop-color="#13111a"/>
    </radialGradient>

    <!-- Dot pattern for subtle grid -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.6" fill="#d97757" opacity="0.12"/>
    </pattern>

    <!-- Animated ring rotation -->
    <style>
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes spinR { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
      @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      @keyframes dash { to { stroke-dashoffset: -40; } }
      @keyframes fadeFloat { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.5; } }
      .ring-spin { animation: spin 20s linear infinite; }
      .ring-spin-r { animation: spinR 25s linear infinite; }
      .portal-pulse { animation: pulse 3s ease-in-out infinite; }
      .stream-flow { animation: dash 2s linear infinite; }
      .particle { animation: fadeFloat 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="12" fill="url(#bgGlow)"/>
  <rect width="900" height="280" rx="12" fill="url(#dots)"/>

  <!-- Horizontal scan lines for depth -->
  <g opacity="0.04">
    <line x1="0" y1="60" x2="900" y2="60" stroke="#d97757" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="#d97757" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="900" y2="180" stroke="#d97757" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="900" y2="240" stroke="#d97757" stroke-width="0.5"/>
  </g>

  <!-- === LEFT PORTAL === -->
  <g transform="translate(185, 128)">
    <!-- Glow backdrop -->
    <circle cx="0" cy="0" r="72" fill="url(#portalGlow)" class="portal-pulse"/>

    <!-- Outer ring (rotating) -->
    <g class="ring-spin" style="transform-origin: 0px 0px;">
      <circle cx="0" cy="0" r="58" fill="none" stroke="url(#ringL)" stroke-width="2.5"
              stroke-dasharray="12 8 4 8" opacity="0.7"/>
    </g>

    <!-- Middle ring (counter-rotating) -->
    <g class="ring-spin-r" style="transform-origin: 0px 0px;">
      <circle cx="0" cy="0" r="46" fill="none" stroke="#d97757" stroke-width="1.5"
              stroke-dasharray="6 12" opacity="0.5"/>
    </g>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="#f0a882" stroke-width="1" opacity="0.4"/>

    <!-- Portal core -->
    <circle cx="0" cy="0" r="22" fill="#d97757" opacity="0.08"/>

    <!-- Machine icon inside portal -->
    <g opacity="0.7">
      <!-- Monitor -->
      <rect x="-14" y="-12" width="28" height="18" rx="2" fill="none" stroke="#f0a882" stroke-width="1.2"/>
      <!-- Screen content line -->
      <line x1="-9" y1="-5" x2="4" y2="-5" stroke="#d97757" stroke-width="1" opacity="0.6"/>
      <line x1="-9" y1="-1" x2="8" y2="-1" stroke="#d97757" stroke-width="1" opacity="0.4"/>
      <line x1="-9" y1="3" x2="1" y2="3" stroke="#d97757" stroke-width="1" opacity="0.3"/>
      <!-- Stand -->
      <line x1="0" y1="6" x2="0" y2="11" stroke="#f0a882" stroke-width="1.2"/>
      <line x1="-6" y1="11" x2="6" y2="11" stroke="#f0a882" stroke-width="1.2"/>
    </g>
  </g>

  <!-- === RIGHT PORTAL === -->
  <g transform="translate(715, 128)">
    <!-- Glow backdrop -->
    <circle cx="0" cy="0" r="72" fill="url(#portalGlow)" class="portal-pulse" style="animation-delay: -1.5s;"/>

    <!-- Outer ring (rotating) -->
    <g class="ring-spin-r" style="transform-origin: 0px 0px;">
      <circle cx="0" cy="0" r="58" fill="none" stroke="url(#ringR)" stroke-width="2.5"
              stroke-dasharray="12 8 4 8" opacity="0.7"/>
    </g>

    <!-- Middle ring (counter-rotating) -->
    <g class="ring-spin" style="transform-origin: 0px 0px;">
      <circle cx="0" cy="0" r="46" fill="none" stroke="#d97757" stroke-width="1.5"
              stroke-dasharray="6 12" opacity="0.5"/>
    </g>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="#f0a882" stroke-width="1" opacity="0.4"/>

    <!-- Portal core -->
    <circle cx="0" cy="0" r="22" fill="#d97757" opacity="0.08"/>

    <!-- Machine icon inside portal -->
    <g opacity="0.7">
      <!-- Laptop -->
      <path d="M-14,2 L-14,-10 Q-14,-12 -12,-12 L12,-12 Q14,-12 14,-10 L14,2" fill="none" stroke="#f0a882" stroke-width="1.2"/>
      <!-- Screen content -->
      <line x1="-9" y1="-5" x2="6" y2="-5" stroke="#d97757" stroke-width="1" opacity="0.6"/>
      <line x1="-9" y1="-1" x2="3" y2="-1" stroke="#d97757" stroke-width="1" opacity="0.4"/>
      <!-- Keyboard base -->
      <path d="M-18,2 Q-18,6 -14,6 L14,6 Q18,6 18,2 Z" fill="none" stroke="#f0a882" stroke-width="1.2"/>
    </g>
  </g>

  <!-- === ENERGY STREAMS connecting portals === -->
  <g>
    <!-- Main stream -->
    <path d="M243,128 C350,100 550,100 657,128" fill="none" stroke="url(#stream)" stroke-width="1.5"
          stroke-dasharray="8 6" class="stream-flow" opacity="0.6"/>
    <path d="M243,128 C350,156 550,156 657,128" fill="none" stroke="url(#stream)" stroke-width="1.5"
          stroke-dasharray="8 6" class="stream-flow" opacity="0.6" style="animation-delay: -1s;"/>

    <!-- Secondary thinner streams -->
    <path d="M250,120 C370,88 530,88 650,120" fill="none" stroke="#d97757" stroke-width="0.8"
          stroke-dasharray="4 10" class="stream-flow" opacity="0.3" style="animation-delay: -0.5s;"/>
    <path d="M250,136 C370,168 530,168 650,136" fill="none" stroke="#d97757" stroke-width="0.8"
          stroke-dasharray="4 10" class="stream-flow" opacity="0.3" style="animation-delay: -1.5s;"/>

    <!-- Center energy convergence -->
    <circle cx="450" cy="128" r="3" fill="#f0a882" opacity="0.5" class="portal-pulse"/>
    <circle cx="450" cy="128" r="8" fill="none" stroke="#d97757" stroke-width="0.5" opacity="0.3" class="portal-pulse"/>
  </g>

  <!-- === FLOATING PARTICLES === -->
  <g>
    <circle cx="300" cy="105" r="1.5" fill="#d97757" class="particle"/>
    <circle cx="380" cy="145" r="1" fill="#f0a882" class="particle" style="animation-delay: -0.7s;"/>
    <circle cx="520" cy="110" r="1.2" fill="#d97757" class="particle" style="animation-delay: -1.4s;"/>
    <circle cx="600" cy="148" r="1" fill="#f0a882" class="particle" style="animation-delay: -2.1s;"/>
    <circle cx="340" cy="138" r="0.8" fill="#e8956a" class="particle" style="animation-delay: -0.3s;"/>
    <circle cx="560" cy="118" r="1.3" fill="#e8956a" class="particle" style="animation-delay: -1.8s;"/>
    <circle cx="420" cy="108" r="0.7" fill="#f0a882" class="particle" style="animation-delay: -2.5s;"/>
    <circle cx="480" cy="150" r="0.9" fill="#d97757" class="particle" style="animation-delay: -1.1s;"/>
  </g>

  <!-- === TITLE TEXT === -->
  <text x="450" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="38" font-weight="700" letter-spacing="14" fill="#f0a882">
    TELEPORT
  </text>

  <!-- Tagline -->
  <text x="450" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="12" font-weight="400" letter-spacing="3" fill="#d97757" opacity="0.7">
    BEAM YOUR CLAUDE CODE SETUP ACROSS MACHINES
  </text>

  <!-- Subtle corner decorations -->
  <g opacity="0.15" stroke="#d97757" stroke-width="1" fill="none">
    <!-- Top left -->
    <path d="M20,20 L20,35 M20,20 L35,20"/>
    <!-- Top right -->
    <path d="M880,20 L880,35 M880,20 L865,20"/>
    <!-- Bottom left -->
    <path d="M20,260 L20,245 M20,260 L35,260"/>
    <!-- Bottom right -->
    <path d="M880,260 L880,245 M880,260 L865,260"/>
  </g>

  <!-- Version / subtle branding -->
  <text x="870" y="268" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="8" fill="#d97757" opacity="0.25" letter-spacing="1">
    CLAUDE CODE PLUGIN
  </text>
</svg>
